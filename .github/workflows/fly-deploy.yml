# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/
#
# Deploy is gated on CI: it runs only after the "CI" workflow completes
# SUCCESSFULLY on main, so a red build can never ship to production.

name: Fly Deploy
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    # Deploy ONLY for a green CI run that came from a push to this repo's own
    # main — never from a pull_request run. The workflow_run `branches: [main]`
    # filter matches on the triggering run's head_branch, so a FORK PR whose
    # source branch is literally named "main" would otherwise satisfy it and
    # deploy the fork's head_sha (with this repo's FLY_API_TOKEN). The event ==
    # 'push' + same-repo head check closes that hole.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.head_branch == 'main'
    concurrency: deploy-group    # ensure only one deploy runs at a time
    steps:
      - uses: actions/checkout@v6
        with:
          # Deploy the EXACT commit CI just verified — a bare checkout grabs
          # default-branch HEAD, which can be a newer commit whose own CI run
          # is still pending (or red).
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
