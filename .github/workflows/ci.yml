name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # 8.1 is the hard local-dev floor (composer.json php "^8.1"); 8.2 is
        # CI/prod. Testing both catches any 8.2-only syntax before it breaks a
        # local artisan/test run — the constraint the whole team relies on.
        php-version: ['8.1', '8.2']

    name: test (PHP ${{ matrix.php-version }})

    steps:
      - uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, sqlite3, pdo_sqlite, intl, bcmath
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/composer
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      # Surface known CVEs in locked deps. Informational (continue-on-error) so
      # an upstream advisory with no in-constraint fix (e.g. a laravel/framework
      # CVE needing a major bump) can't wedge the pipeline — but it's visible in
      # the run and Dependabot opens PRs for anything patchable.
      - name: Security audit (composer)
        run: composer audit --no-interaction
        continue-on-error: true

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Run migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force

      - name: Run tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

      # docker/entrypoint.sh runs these on every prod boot under `set -e` —
      # a config closure or unserializable route fatals there and crash-loops
      # the machine. Exercise the exact same commands pre-merge.
      - name: Production cache smoke (mirrors docker/entrypoint.sh)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
