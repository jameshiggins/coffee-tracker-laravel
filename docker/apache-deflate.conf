# gzip text responses. /api/roasters is the SPA's firehose — hundreds of KB of
# JSON shipped uncompressed on every page. mod_deflate is enabled in the
# Dockerfile; this says WHAT to compress. Images/fonts are already compressed
# and are deliberately omitted.
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE application/json
    AddOutputFilterByType DEFLATE text/html text/plain text/css text/xml
    AddOutputFilterByType DEFLATE application/javascript application/x-javascript
    AddOutputFilterByType DEFLATE application/xml application/xml+rss image/svg+xml
</IfModule>
