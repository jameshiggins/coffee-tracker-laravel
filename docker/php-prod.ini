; Production PHP tuning for the Fly image (loaded from conf.d as zz-prod.ini so
; it wins over the defaults). The base php:8.2-apache image ships opcache
; compiled but NOT configured, so every request re-parsed and re-compiled the
; whole framework — the single biggest avoidable request cost on a 1-CPU box.

[opcache]
opcache.enable = 1
; CLI (artisan migrate/scheduler/queue) doesn't benefit from a per-process cache.
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
; The container image is immutable per deploy — the code never changes under a
; running machine — so never stat files for freshness. This is the setting that
; actually makes opcache fast; pair it with a re-cache on every boot (the
; entrypoint already runs config:cache/route:cache/view:cache).
opcache.validate_timestamps = 0

[PHP]
memory_limit = 256M
expose_php = Off
