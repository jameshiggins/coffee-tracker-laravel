# fly.toml app configuration for coffee-tracker-laravel
# See https://fly.io/docs/reference/configuration/

app = 'coffee-tracker-laravel'
primary_region = 'sjc'
console_command = 'php /var/www/html/artisan tinker'

[build]
  [build.args]
    PHP_VERSION = '8.2'

[env]
  APP_ENV = 'production'
  APP_DEBUG = 'false'
  APP_URL = 'https://api.roastmap.ca'
  FRONTEND_URL = 'https://roastmap.ca'
  LOG_CHANNEL = 'stderr'
  LOG_LEVEL = 'info'
  LOG_STDERR_FORMATTER = 'Monolog\Formatter\JsonFormatter'
  SESSION_DRIVER = 'cookie'
  SESSION_SECURE_COOKIE = 'true'
  DB_CONNECTION = 'sqlite'
  DB_DATABASE = '/data/database.sqlite'
  # Convert the volume DB to WAL on boot (three concurrent writers: web,
  # scheduler, queue worker). Deliberately NOT the default — tests/CI must
  # never attempt the exclusive-lock conversion.
  DB_SQLITE_WAL = 'true'
  # Heavy imports + transactional mail run on the queue worker started in
  # docker/entrypoint.sh, not inline on the web request.
  QUEUE_CONNECTION = 'database'

[http_service]
  internal_port = 8080
  force_https = true
  # Machine must stay up 24/7 so the in-container Laravel scheduler keeps
  # ticking (daily import + restock alerts). auto_stop would sleep the
  # scheduler and miss the 11:00 UTC import. Single machine, never scale
  # beyond 1 (SQLite + single mounted volume).
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  # Gate rolling deploys on the app actually being healthy, not just the
  # machine process starting. /up is HealthController: 200 healthy / 503
  # degraded (DB, queue, etc.). grace_period is generous because
  # docker/entrypoint.sh runs migrations on boot before the app serves.
  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/up'

[[mounts]]
  source = 'coffee_db'
  destination = '/data'
  initial_size = '1gb'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
